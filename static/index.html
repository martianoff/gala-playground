<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALA Playground</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-panel: #161b22;
            --bg-editor: #1a1f2b;
            --bg-hover: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --red: #f85149;
            --orange: #d29922;
            --purple: #bc8cff;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 52px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #fff;
        }

        .logo span { color: var(--accent); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Buttons */
        .btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn:hover { border-color: var(--text-dim); }

        .btn-primary {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #46c15a;
            border-color: #46c15a;
        }

        .btn-primary:active { transform: scale(0.97); }

        .btn-primary.running {
            background: var(--orange);
            border-color: var(--orange);
            pointer-events: none;
        }

        .btn kbd {
            background: rgba(255,255,255,0.15);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 11px;
            font-family: inherit;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select {
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        select:hover { border-color: var(--text-dim); }

        .status {
            font-size: 12px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
        }

        /* Main layout */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }

        .divider {
            width: 3px;
            background: var(--border);
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .divider:hover { background: var(--accent); }

        /* Editor */
        .editor-wrap {
            position: relative;
            flex: 1;
            overflow: hidden;
        }

        .line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 48px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 12px 0;
            overflow: hidden;
            user-select: none;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-dim);
            text-align: right;
        }

        .line-numbers-inner {
            padding-right: 10px;
        }

        #editor {
            width: 100%;
            height: 100%;
            padding: 12px 16px 12px 60px;
            background: var(--bg-editor);
            color: var(--text);
            border: none;
            outline: none;
            resize: none;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            tab-size: 4;
            white-space: pre;
            overflow: auto;
        }

        #editor::placeholder { color: var(--text-dim); }

        /* Output */
        .output-panel {
            background: var(--bg-editor);
        }

        #output {
            flex: 1;
            padding: 12px 16px;
            overflow: auto;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output-success { color: var(--text); }
        .output-error { color: var(--red); }
        .output-placeholder { color: var(--text-dim); font-style: italic; }

        .output-meta {
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* Loading spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* Welcome overlay */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            text-align: center;
            padding: 20px;
        }

        .welcome h2 {
            color: var(--text);
            font-size: 16px;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 13px;
            line-height: 1.6;
        }

        .welcome kbd {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-family: var(--font-mono);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .workspace { flex-direction: column; }
            .divider {
                width: auto;
                height: 3px;
                cursor: row-resize;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">G</div>
            <span>GALA</span> Playground
        </div>
        <div class="header-actions">
            <button class="btn" onclick="formatCode()" title="Format code">
                Format
            </button>
            <button class="btn" onclick="shareCode()" title="Copy code to clipboard">
                Share
            </button>
            <button class="btn btn-primary" id="runBtn" onclick="runCode()">
                <span id="runIcon">&#9654;</span>
                <span id="runText">Run</span>
                <kbd>Ctrl+Enter</kbd>
            </button>
        </div>
    </header>

    <div class="toolbar">
        <div class="toolbar-left">
            <select id="examples" onchange="loadExample(this.value)">
                <option value="">-- Select Example --</option>
            </select>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span>GALA Playground</span>
        </div>
    </div>

    <div class="workspace">
        <div class="panel">
            <div class="panel-header">
                <span>main.gala</span>
                <span id="charCount">0 chars</span>
            </div>
            <div class="editor-wrap">
                <div class="line-numbers" id="lineNumbers">
                    <div class="line-numbers-inner" id="lineNumbersInner"></div>
                </div>
                <textarea id="editor" spellcheck="false" placeholder="Write your GALA code here..."></textarea>
            </div>
        </div>

        <div class="divider" id="divider"></div>

        <div class="panel output-panel">
            <div class="panel-header">
                <span>Output</span>
                <span id="execTime"></span>
            </div>
            <div id="output">
                <div class="welcome">
                    <h2>Welcome to GALA Playground</h2>
                    <p>Write GALA code and press <kbd>Ctrl+Enter</kbd> to run.<br>
                    Or select an example from the dropdown above.</p>
                </div>
            </div>
            <div class="output-meta" id="outputMeta" style="display:none">
                <span id="metaLeft"></span>
                <span id="metaRight"></span>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const output = document.getElementById('output');
        const runBtn = document.getElementById('runBtn');
        const runIcon = document.getElementById('runIcon');
        const runText = document.getElementById('runText');
        const lineNumbersInner = document.getElementById('lineNumbersInner');
        const lineNumbers = document.getElementById('lineNumbers');
        const charCount = document.getElementById('charCount');
        const execTime = document.getElementById('execTime');
        const outputMeta = document.getElementById('outputMeta');
        const metaLeft = document.getElementById('metaLeft');
        const metaRight = document.getElementById('metaRight');
        const examplesSelect = document.getElementById('examples');

        let examples = [];

        // Load examples
        async function loadExamples() {
            try {
                const resp = await fetch('/api/examples');
                examples = await resp.json();
                examples.forEach((ex, i) => {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = ex.name;
                    examplesSelect.appendChild(opt);
                });
                // Load "Hello" example by default
                const helloIdx = examples.findIndex(e => e.name.toLowerCase().includes('hello'));
                if (helloIdx >= 0) {
                    examplesSelect.value = helloIdx;
                    loadExample(helloIdx);
                }
            } catch (e) {
                console.error('Failed to load examples:', e);
            }
        }

        function loadExample(idx) {
            if (idx === '' || idx === null) return;
            const ex = examples[parseInt(idx)];
            if (ex) {
                editor.value = ex.code;
                updateLineNumbers();
                updateCharCount();
            }
        }

        // Line numbers
        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            let html = '';
            for (let i = 1; i <= lines; i++) {
                html += i + '\n';
            }
            lineNumbersInner.textContent = html;
        }

        function syncScroll() {
            lineNumbers.style.transform = `translateY(-${editor.scrollTop}px)`;
            lineNumbersInner.style.paddingTop = '0px';
            lineNumbers.scrollTop = editor.scrollTop;
        }

        function updateCharCount() {
            charCount.textContent = editor.value.length + ' chars';
        }

        // Tab support
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                updateLineNumbers();
            }
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                runCode();
            }
        });

        editor.addEventListener('input', () => {
            updateLineNumbers();
            updateCharCount();
        });

        editor.addEventListener('scroll', syncScroll);

        // Run code
        async function runCode() {
            const code = editor.value.trim();
            if (!code) return;

            runBtn.classList.add('running');
            runIcon.innerHTML = '<div class="spinner"></div>';
            runText.textContent = 'Running...';

            output.className = '';
            output.textContent = 'Compiling and running...';
            execTime.textContent = '';
            outputMeta.style.display = 'none';

            try {
                const resp = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code }),
                });
                const result = await resp.json();

                if (result.error) {
                    output.className = 'output-error';
                    // Clean up error messages
                    let errText = result.error;
                    errText = errText.replace(/Build failed: transpiling: transpiling [^:]+: /g, '');
                    output.textContent = errText;
                    metaLeft.textContent = 'Exit: error';
                } else {
                    output.className = 'output-success';
                    output.textContent = result.output || '(no output)';
                    const lines = (result.output || '').split('\n').filter(l => l).length;
                    metaLeft.textContent = `${lines} line${lines !== 1 ? 's' : ''} of output`;
                }

                execTime.textContent = result.time || '';
                metaRight.textContent = result.time ? `Completed in ${result.time}` : '';
                outputMeta.style.display = 'flex';
            } catch (e) {
                output.className = 'output-error';
                output.textContent = 'Failed to connect to server: ' + e.message;
            } finally {
                runBtn.classList.remove('running');
                runIcon.innerHTML = '&#9654;';
                runText.textContent = 'Run';
            }
        }

        // Format (simple indent normalizer)
        function formatCode() {
            // Just normalize trailing whitespace and ensure final newline
            let code = editor.value;
            code = code.split('\n').map(l => l.trimEnd()).join('\n');
            if (!code.endsWith('\n')) code += '\n';
            editor.value = code;
            updateLineNumbers();
            updateCharCount();
        }

        // Share (copy to clipboard)
        async function shareCode() {
            try {
                await navigator.clipboard.writeText(editor.value);
                const btn = document.querySelector('.btn[onclick="shareCode()"]');
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = orig; }, 1500);
            } catch (e) {
                alert('Failed to copy to clipboard');
            }
        }

        // Resizable divider
        const divider = document.getElementById('divider');
        let isResizing = false;

        divider.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const workspace = document.querySelector('.workspace');
            const rect = workspace.getBoundingClientRect();
            const pct = ((e.clientX - rect.left) / rect.width) * 100;
            const panels = workspace.querySelectorAll('.panel');
            panels[0].style.flex = `0 0 ${pct}%`;
            panels[1].style.flex = `0 0 ${100 - pct}%`;
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });

        // Init
        updateLineNumbers();
        loadExamples();
    </script>
</body>
</html>
